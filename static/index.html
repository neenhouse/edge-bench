<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeBench — Global Latency Observatory</title>
  <meta name="description" content="Real-time latency benchmarking across Deno Deploy's 35+ global edge regions." />

  <!-- Favicon: globe with pulse -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2309090b'/><circle cx='16' cy='16' r='10' fill='none' stroke='%2314b8a6' stroke-width='2'/><path d='M6 16 Q16 8 26 16 Q16 24 6 16' fill='none' stroke='%2314b8a6' stroke-width='1.5'/><line x1='16' y1='6' x2='16' y2='26' stroke='%2314b8a6' stroke-width='1.5'/><circle cx='24' cy='10' r='3' fill='%2314b8a6'/><circle cx='24' cy='10' r='5' fill='none' stroke='%2314b8a6' stroke-width='1' opacity='0.5'/></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

    <!-- Header -->

      <div>
        <div class="logo">Edge<span>Bench</span></div>
        <div class="subtitle">Global Latency Observatory — Deno Deploy</div>
      </div>
      <div class="region-badge">
        <span class="region-dot"></span>
        Your region: <strong id="region-name">detecting…</strong>
      </div>
    </header>

        <!-- ── Deno Deploy Region Nodes ── -->

        <!-- US East (Virginia/NYC area) -->
        <g id="region-us-east">
          <circle class="region-node" cx="215" cy="140" r="5"/>
          <circle class="region-pulse" cx="215" cy="140" r="4"/>
        </g>

        <!-- US West (Oregon/California) -->
        <g id="region-us-west">
          <circle class="region-node" cx="95" cy="145" r="5"/>
          <circle class="region-pulse" cx="95" cy="145" r="4" style="animation-delay: 0.8s"/>
        </g>

        <!-- US Central -->
        <g id="region-us-central">
          <circle class="region-node" cx="162" cy="148" r="4"/>
        </g>

        <!-- South America (São Paulo) -->
        <g id="region-sa">
          <circle class="region-node" cx="230" cy="390" r="5"/>
          <circle class="region-pulse" cx="230" cy="390" r="4" style="animation-delay: 1.2s"/>
        </g>

        <!-- Europe West (Frankfurt/Amsterdam/Paris) -->
        <g id="region-eu-west">
          <circle class="region-node" cx="490" cy="95" r="5"/>
          <circle class="region-pulse" cx="490" cy="95" r="4" style="animation-delay: 0.4s"/>
        </g>

        <!-- Europe North (Stockholm) -->
        <g id="region-eu-north">
          <circle class="region-node" cx="505" cy="62" r="4"/>
        </g>

        <!-- Europe East (Warsaw) -->
        <g id="region-eu-east">
          <circle class="region-node" cx="535" cy="95" r="4"/>
        </g>

        <!-- Middle East (Dubai/Bahrain) -->
        <g id="region-me">
          <circle class="region-node" cx="620" cy="175" r="4"/>

        <g id="region-af">
          <circle class="region-node" cx="510" cy="370" r="4"/>
        </g>

        <g id="region-ap">
          <circle class="region-node" cx="748" cy="268" r="5"/>
          <circle class="region-pulse" cx="748" cy="268" r="4" style="animation-delay: 1.6s"/>
        </g>

        <!-- Asia Pacific (Tokyo) -->
        <g id="region-ap-jp">
          <circle class="region-node" cx="878" cy="130" r="5"/>
          <circle class="region-pulse" cx="878" cy="130" r="4" style="animation-delay: 0.6s"/>
        </g>

        <!-- Asia Pacific (Hong Kong) -->
        <g id="region-ap-hk">
          <circle class="region-node" cx="808" cy="195" r="4"/>
        </g>

        <!-- Asia Pacific (Mumbai) -->
        <g id="region-ap-in">
          <circle class="region-node" cx="662" cy="220" r="4"/>
        </g>

        <!-- Asia Pacific (Seoul) -->
        <g id="region-ap-kr">
          <circle class="region-node" cx="845" cy="138" r="4"/>
        </g>

        <!-- Australia (Sydney) -->
        <g id="region-au">
          <circle class="region-node" cx="902" cy="378" r="5"/>
          <circle class="region-pulse" cx="902" cy="378" r="4" style="animation-delay: 2.0s"/>
        </g>

        <!-- Region labels (on hover via CSS title) -->
        <title>EdgeBench World Map — Deno Deploy Regions</title>
      </svg>
    </section>

    <!-- Controls -->
    <div class="controls">
      <div id="workload-btns" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
      <button class="run-btn" id="run-btn">Run Benchmark</button>
    </div>

    <!-- Results panel -->
    <div class="results-panel">
      <div class="results-header">
        <span class="results-title">Results</span>
        <span class="cold-start-badge" id="cold-start-badge">&#9889; Cold Start Detected</span>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-cell">
          <div class="stat-label">p50</div>
          <div class="stat-value empty" id="stat-p50">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">p95</div>
          <div class="stat-value empty" id="stat-p95">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">p99</div>
          <div class="stat-value empty" id="stat-p99">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">min</div>
          <div class="stat-value empty" id="stat-min">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">max</div>
          <div class="stat-value empty" id="stat-max">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">mean</div>
          <div class="stat-value empty" id="stat-mean">—</div>
        </div>
      </div>

      <!-- Bar chart -->
      <div class="chart-area">
        <div class="chart-label">Request latency — 20 sequential requests</div>
        <div id="bars-container"></div>
        <div id="empty-state" class="empty-state">
          <div class="icon">&#9671;</div>
          <div>Select a workload and click <strong>Run Benchmark</strong> to start</div>
        </div>
      </div>

      <!-- Previous runs -->
      <div class="prev-runs-toggle" id="prev-runs-toggle">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Previous runs (last 3)
      </div>
      <div class="prev-runs-section" id="prev-runs-section">
        <div id="prev-runs-list"></div>
      </div>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
